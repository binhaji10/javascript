<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration System</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
        padding:30px;
    }

    .container{
        max-width:1000px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
    }

    form{
        display:grid;
        grid-template-columns:repeat(2,1fr);
        gap:15px;
        margin-bottom:20px;
    }

    input, select{
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
    }

    button{
        padding:10px;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }

    .add-btn{
        background:green;
        color:white;
    }

    .update-btn{
        background:orange;
        color:white;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    table th,
    table td{
        border:1px solid #ddd;
        padding:10px;
        text-align:center;
    }

    table th{
        background:#333;
        color:white;
    }

    .edit{
        background:#2196F3;
        color:white;
        padding:6px 10px;
    }

    .delete{
        background:red;
        color:white;
        padding:6px 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Student Registration Form</h1>

    <form id="studentForm">
        <input type="text" id="name" placeholder="Student Name" required>

        <input type="number" id="age" placeholder="Age" required>

        <input type="email" id="email" placeholder="Email" required>

        <select id="course" required>
            <option value="">Select Course</option>
            <option>Computer Science</option>
            <option>Business</option>
            <option>Engineering</option>
            <option>Medicine</option>
        </select>

        <button type="submit" class="add-btn" id="submitBtn">
            Add Student
        </button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>
